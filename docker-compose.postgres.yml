services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: astrbot
      POSTGRES_PASSWORD: astrbot
      POSTGRES_DB: astrbot_context
    volumes:
      - astrbot_context_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrbot -d astrbot_context"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  astrbot_context_postgres:
